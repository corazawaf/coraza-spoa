---

logfile: '/build/ftw.log'
maxmarkerretries: 10
testoverride:
  input:
    dest_addr: 'haproxy'
    port: 8080
  ignore:
    # Imported from https://github.com/corazawaf/coraza/blob/main/testing/coreruleset/.ftw.yml
    920100-4: 'Invalid uri, Coraza not reached - 404 page not found'

    # Failing tests related to upstream issues:
    921250-1: 'Expected to match $Version in cookies, failing also in upstream'
    921250-2: 'Expected to match $Version in cookies, failing also in upstream'
    933120-2: 'To be investigated: match_regex value  might be ModSec specific'

    # HAProxy specific.
    920100-3: 'HAProxy normalizes OPTIONS * URI before SPOE sees it'
    920100-16: 'HAProxy normalizes absolute URI before SPOE sees it'
    920210-2: 'HAProxy normalizes duplicate Connection header values'
    920210-3: 'HAProxy normalizes duplicate Connection header values'
    920210-4: 'HAProxy normalizes duplicate Connection header values'
    920210-6: 'HAProxy normalizes duplicate Connection header values'
    920210-7: 'HAProxy normalizes duplicate Connection header values'
    920270-4: 'Rule works, log contains 920270. Test expects status 400 (Apache behaviour)'
    920290-1: 'Rule works, log contains 920290. Test expects status 400 (Apache behaviour)'
    920430-5: 'Test has expect_error, Go/http, Envoy and HAProxy return 400'
    920620-1: 'Rule works, log contains 920620. Test expects 200 (Apache behavour)'
    920430-8: 'Unknown HTTP Versions are blocked in HAProxy'
    920400-1: 'Limited Body content length because of protocol limitations.'

    # XSS tests with raw bytes (\xbc, \xbe) in POST body. Pass upstream
    # but fail through SPOE, likely due to body encoding in transit.
    941310-1: 'Raw bytes in POST body not preserved through SPOE (passes upstream)'
    941310-3: 'Raw bytes in POST body not preserved through SPOE (passes upstream)'
    941310-12: 'Raw bytes in POST body not preserved through SPOE (passes upstream)'

    # Coraza multipart parser catches invalid bytes as rule 200003
    # (MULTIPART_STRICT_ERROR) before CRS rule 922130 runs.
    # Upstream overrides these to expect 200003 instead of 922130.
    922130-1: 'Coraza triggers MULTIPART_STRICT_ERROR (200003) instead of 922130'
    922130-2: 'Coraza triggers MULTIPART_STRICT_ERROR (200003) instead of 922130'
    922130-7: 'Coraza triggers MULTIPART_STRICT_ERROR (200003) instead of 922130'

    # HAProxy rejects invalid Host header bytes before SPOE sees the request.
    # Upstream overrides this to expect rule 920274 (not status 400).
    920274-1: 'HAProxy rejects invalid Host header byte (0x1F) before SPOE'

    # HAProxy requires/adds Host header for HTTP/1.0 requests.
    920280-1: 'HAProxy handles missing Host header before SPOE sees the request'

    # HAProxy adds Content-Type to POST requests with Content-Length.
    920340-1: 'HAProxy adds Content-Type header before SPOE sees the request'
    920340-2: 'HAProxy adds Content-Type header before SPOE sees the request'

    # HAProxy SPOE body buffer (tune.bufsize) truncates large request bodies.
    # These tests send ~64KB payloads that exceed the default SPOE buffer.
    920390-1: 'SPOE body buffer truncates 64KB argument payload'
    920410-1: 'SPOE body buffer truncates 64KB multipart file upload'
    942521-17: 'Long SQLi payload likely truncated or hits SPOE processing timeout'

    # SSRF tests using Unicode-encoded IPs/hostnames (circled digits,
    # ideographic full stops). These pass in upstream Coraza but fail
    # through HAProxy, likely due to URI/query re-encoding.
    934120-23: 'HAProxy re-encodes circled Unicode digits in query string'
    934120-24: 'HAProxy re-encodes circled Unicode digits in query string'
    934120-25: 'HAProxy re-encodes circled Unicode letters in query string'
    934120-26: 'HAProxy re-encodes circled Unicode letters in query string'
    934120-39: 'HAProxy re-encodes ideographic full stops (U+3002) in query string'

    # RCE detection in Referer header fragment. Passes upstream but fails
    # through HAProxy, likely due to fragment stripping or encoding.
    932207-1: 'HAProxy may strip or encode fragment (#) in Referer header'
    932207-7: 'HAProxy may strip or encode fragment (#) in Referer header'

    # Multipart illegal charset detection (rule 922110). These tests check
    # TX:MULTIPART_HEADERS_CONTENT_TYPES_* variables. They pass upstream
    # but fail through SPOE, likely due to multipart body handling differences.
    922110-1: 'Multipart charset detection fails through SPOE (passes upstream)'
    922110-2: 'Multipart charset detection fails through SPOE (passes upstream)'
    922110-3: 'Multipart charset detection fails through SPOE (passes upstream)'
    922110-4: 'Multipart charset detection fails through SPOE (passes upstream)'
    922110-7: 'Multipart charset detection fails through SPOE (passes upstream)'
    922110-8: 'Multipart charset detection fails through SPOE (passes upstream)'
    922110-9: 'Multipart charset detection fails through SPOE (passes upstream)'
    922110-11: 'Multipart charset detection fails through SPOE (passes upstream)'
    922110-15: 'Multipart charset detection fails through SPOE (passes upstream)'
    922110-20: 'Multipart charset detection fails through SPOE (passes upstream)'
    922110-21: 'Multipart charset detection fails through SPOE (passes upstream)'
    922110-23: 'Multipart charset detection fails through SPOE (passes upstream)'
    922110-24: 'Multipart charset detection fails through SPOE (passes upstream)'
    922110-25: 'Multipart charset detection fails through SPOE (passes upstream)'
    922110-26: 'Multipart charset detection fails through SPOE (passes upstream)'
    922110-28: 'Multipart charset detection fails through SPOE (passes upstream)'
    922110-29: 'Multipart charset detection fails through SPOE (passes upstream)'