on:
  push:
    branches:
      - main

permissions: {}

name: release-please

jobs:
  release-please:
    permissions:
      contents: write
      pull-requests: write
      issues: write
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4
        with:
          # this is not recommended, but we don't run any actions on release
          token: ${{ secrets.GITHUB_TOKEN }}
          release-type: simple
